name: 10 - Functions

on:
  pull_request:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      # 2) Bug step (para PRs): se ejecuta si el título contiene "fix"
      - name: Bug step
        if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'fix') }}
        run: echo "Bug fix detected"

      # 1) Failing step: falla a propósito
      - name: Failing step
        run: |
          echo "This step will fail intentionally"
          exit 1

      # 2) Run on success: solo si lo anterior fue bien
      - name: Run on success
        if: ${{ success() }}
        run: echo "Success step"

      # 3) Run on failure: solo si algo anterior falló
      - name: Run on failure
        if: ${{ failure() }}
        run: echo "Failure step"

      # 4) Always step: siempre
      - name: Always step
        if: ${{ always() }}
        run: echo "Always step"