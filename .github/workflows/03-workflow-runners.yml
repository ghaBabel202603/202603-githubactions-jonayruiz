name:  03 - Uso de runners
on:
  push: 
jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: "mostrar SO"
        run: |
          echo "estre trabajo se ejectuta en un runner de ubuntu" 
          echo $RUNNER_OS
  windows-echo:
    runs-on: windows-latest
    steps:
      - name: "mostrar SO"
        shell: bash
        run: |
          echo "estre trabajo se ejectuta en un runner de windows" 
          echo $RUNNER_OS
  umac-echo:
    runs-on: macos-latest
    steps:
      - name: "mostrar SO"
        run: |
          echo "estre trabajo se ejectuta en un runner de mac" 
          echo $RUNNER_OS